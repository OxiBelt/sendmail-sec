name: Check

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"

jobs:
  devops:
    name: DevOps checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.10.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: DevOps lint
        run: pnpm run lint

      - name: DevOps typecheck
        run: pnpm run typecheck

      - name: DevOps tests
        run: pnpm run test

      - name: Versioning check
        run: pnpm run versioning:check

  unit-tests:
    name: Unit tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up cargo
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --locked

  docker-image:
    name: Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            qemu_platforms: ""
            image_tar: sendmail-sec-alpine-musl-amd64.tar
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            qemu_platforms: ""
            image_tar: sendmail-sec-alpine-musl-arm64.tar
          - arch: riscv64
            platform: linux/riscv64
            runner: ubuntu-latest
            qemu_platforms: riscv64
            image_tar: sendmail-sec-alpine-musl-riscv64.tar

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        if: matrix.qemu_platforms != ''
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: ${{ matrix.qemu_platforms }}

      - name: Pre-pull Docker BuildKit image
        run: scripts/retry-docker-pull.sh moby/buildkit:buildx-stable-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image artifact
        run: |
          scripts/build-docker-image-artifact.sh \
            "${{ matrix.platform }}" \
            "${{ matrix.arch }}" \
            "${RUNNER_TEMP}/sendmail-sec-image"

      - name: Load Docker image artifact
        run: docker load --input "${RUNNER_TEMP}/sendmail-sec-image/${{ matrix.image_tar }}"

      # The riscv64 image is executed through QEMU on GitHub's amd64 runner.
      # Native amd64/arm64 jobs cover TLS relay behavior; riscv64 gets a
      # container startup smoke test below.
      - name: Run Docker integration test
        if: matrix.arch != 'riscv64'
        env:
          APP_IMAGE: sendmail-sec:alpine-musl-${{ matrix.arch }}
          APP_IMAGE_CLEANUP: "1"
        run: scripts/docker-integration-test.sh

      - name: Run Docker smoke test
        if: matrix.arch == 'riscv64'
        env:
          IMAGE_TAG: sendmail-sec:alpine-musl-${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: docker run --rm --platform "${PLATFORM}" "${IMAGE_TAG}" --help >/dev/null
