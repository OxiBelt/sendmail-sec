name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
          - target: riscv64gc-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
          - target: riscv64gc-unknown-linux-musl

    steps:
      - name: Validate semver tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]

      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build release binary
        run: cross build --locked --release --target "${{ matrix.target }}"

      - name: Package artifact
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/sendmail-sec" dist/sendmail-sec
          tar -C dist -czf "sendmail-sec-${VERSION}-${TARGET}.tar.gz" sendmail-sec
          sha256sum "sendmail-sec-${VERSION}-${TARGET}.tar.gz" > "sendmail-sec-${VERSION}-${TARGET}.tar.gz.sha256"

      - name: Upload artifact archive
        uses: actions/upload-artifact@v4
        with:
          name: sendmail-sec-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            sendmail-sec-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            sendmail-sec-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
