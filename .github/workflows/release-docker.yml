name: Release Docker Image

on:
  release:
    types:
      - published
  push:
    tags:
      - '*-build.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      image: ${{ steps.release.outputs.image }}
      stable: ${{ steps.release.outputs.stable }}
      tag: ${{ steps.release.outputs.tag }}
      tags: ${{ steps.release.outputs.tags }}

    steps:
      - name: Validate release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          tag="$REF_NAME"

          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          stable_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          if [[ ! "$tag" =~ $semver_regex ]]; then
            echo "release tag must be a Docker-compatible semver tag: $tag" >&2
            exit 1
          fi

          if [ "$EVENT_NAME" = "push" ] && [[ "$tag" != *-build.* ]]; then
            echo "tag push publishing is only enabled for -build. tags: $tag" >&2
            exit 1
          fi

          image="ghcr.io/${REPOSITORY,,}"
          stable=false
          if [[ "$tag" =~ $stable_regex ]]; then
            stable=true
          fi

          IFS=. read -r major minor patch_and_suffix <<< "$tag"

          {
            echo "image=$image"
            echo "stable=$stable"
            echo "tag=$tag"
            echo "tags<<EOF"
            echo "$image:$tag"
            if [ "$stable" = "true" ]; then
              echo "$image:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Docker image (${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            qemu_platforms: ""
            rust_builder_image: rust:1.94-alpine
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            qemu_platforms: ""
            rust_builder_image: rust:1.94-alpine
          - arch: riscv64
            platform: linux/riscv64
            runner: ubuntu-latest
            qemu_platforms: riscv64
            rust_builder_image: rust:1.94-trixie

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.qemu_platforms != ''
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.qemu_platforms }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.validate.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.validate.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            RUST_BUILDER_IMAGE=${{ matrix.rust_builder_image }}
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ needs.validate.outputs.image }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish Docker manifest
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        env:
          IMAGE_NAME: ${{ needs.validate.outputs.image }}
          TAGS: ${{ needs.validate.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          sources=()
          for digest_file in "${RUNNER_TEMP}"/digests/*; do
            sources+=("${IMAGE_NAME}@sha256:$(basename "$digest_file")")
          done

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
