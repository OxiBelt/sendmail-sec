name: Release Docker Image

on:
  release:
    types:
      - published

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Validate semver tag
        run: |
          [[ "${{ github.event.release.tag_name }}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]

      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  build:
    name: Docker image (${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            qemu_platforms: ""
            rust_builder_image: rust:1.94-alpine
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            qemu_platforms: ""
            rust_builder_image: rust:1.94-alpine
          - arch: riscv64
            platform: linux/riscv64
            runner: ubuntu-latest
            qemu_platforms: riscv64
            rust_builder_image: rust:1.94-trixie

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.qemu_platforms != ''
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.qemu_platforms }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.validate.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            RUST_BUILDER_IMAGE=${{ matrix.rust_builder_image }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ needs.validate.outputs.image }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish Docker manifest
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.validate.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Create and push manifest
        env:
          IMAGE_NAME: ${{ needs.validate.outputs.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          sources=()
          for digest_file in "${RUNNER_TEMP}"/digests/*; do
            sources+=("${IMAGE_NAME}@sha256:$(basename "$digest_file")")
          done

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
